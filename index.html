<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> 🐭 生肖小测试 | 用Python做的网页 </title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px 60px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #6a11cb;
      margin-bottom: 20px;
    }
    label {
      font-size: 1.2em;
      display: block;
      margin-bottom: 10px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 1.1em;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input:focus {
      outline: none;
      border-color: #6a11cb;
    }
    button {
      background: #6a11cb;
      color: white;
      padding: 12px 40px;
      font-size: 1.1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #540eaa;
    }
    #result {
      margin-top: 30px;
      font-size: 1.3em;
      font-weight: bold;
      color: #d43c7f;
      min-height: 30px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✨ 猜生肖小测试 </h1>
  <p>输入出生年份，看看你的生肖是哪个？</p>

  <label for="year">请输入你的出生年份：</label>
  <input type="number" id="year" placeholder="例如：1990" />

  <button onclick="submitForm()">确定</button>

  <div id="result"></div>
</div>

<script>
  // 点击按钮时，通过 JavaScript 请求 Python 脚本
  function submitForm() {
    const year = document.getElementById("year").value;
    if (!year) {
      alert("请输入出生年份！");
      return;
    }

    // 使用 fetch 发送请求到 Python 服务器
    fetch(`/calc?year=${year}`)
      .then(response => response.text())
      .then(data => {
        document.getElementById("result").innerHTML = `🎉 你的生肖是：<span style="color: #d43c7f;">${data}</span>`;
      })
      .catch(err => {
        document.getElementById("result").innerHTML = "❌ 服务器出错，请检查 Python 服务是否运行！";
        console.error(err);
      });
  }
</script>

</body>
</html>
